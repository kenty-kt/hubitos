      body {
        font-family: "Inter", sans-serif;
        margin: 0;

      }

      html {
        min-height: 100%;
      }

      .files-shell {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .files-window {
        position: relative;
        width: min(1728px, calc(100vw - 32px));
        height: min(980px, calc(100vh - 32px));
        min-height: 720px;
        border-radius: 28px;
        overflow: hidden;
        background: linear-gradient(180deg, #fff9f8 0%, #fffdfc 100%);
        box-shadow: 0 28px 60px rgba(118, 39, 27, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(24px);
      }

      .ambient-shadow {
        shadow: 0 32px 32px rgba(181, 12, 8, 0.06);
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e5bdb7;
        border-radius: 10px;
      }

      .market-tabs {
        display: flex;
        align-items: center;
        gap: 22px;
      }

      .market-tab {
        position: relative;
        min-height: 56px;
        display: inline-flex;
        align-items: center;
        background: transparent;
        color: #9c8885;
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
      }

      .market-tab.active {
        color: #b50c08;
      }

      .market-tab.active::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -1px;
        height: 3px;
        border-radius: 999px;
        background: #d92d20;
      }

      .toolbar-search {
        position: relative;
      }

      .toolbar-search input {
        width: 320px;
        height: 40px;
        padding: 0 18px 0 44px;
        border: 1px solid rgba(238, 220, 217, 0.95);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: #352523;
        outline: none;
      }

      .toolbar-search .material-symbols-outlined {
        position: absolute;
        left: 16px;
        top: 10px;
        font-size: 18px;
        color: #a18d89;
      }

      @media (max-width: 1280px) {
        body {
          padding: 0;
        }

        .files-window {
          width: 100vw;
          height: 100vh;
          min-height: 100vh;
          border-radius: 0;
        }
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function getVisibleFiles() {
        return state.files.filter((file) => {
          if (state.scope === "trash") {
            if (!file.trashed) return false;
          } else {
            if (file.trashed) return false;
            if (state.scope === "recent" && file.scope !== "recent") return false;
            if (state.scope === "generated" && file.scope !== "generated") return false;
            if (state.scope === "favorites" && !file.favorite) return false;
          }

          if (state.tag !== "all" && !file.tags.includes(state.tag) && file.type !== state.tag) return false;
          if (state.search && !file.name.toLowerCase().includes(state.search.toLowerCase())) return false;
          return true;
        });
      }

      function getSelectedFile() {
        const visible = getVisibleFiles();
        const selected = visible.find((file) => file.id === state.selectedFileId);
        return selected || visible[0] || state.files[0];
      }

      function renderFolders() {
        refs.folderCards.innerHTML =
          state.folders
            .map((folder) => `
              <button class="group cursor-pointer rounded-[1.75rem] border border-outline-variant/10 bg-white p-4 text-left shadow-[0_8px_20px_rgba(0,0,0,0.02)] transition-all hover:shadow-[0_12px_24px_rgba(181,12,8,0.04)]" data-folder-scope="${folder.scope}" type="button">
                <div class="mb-3 flex h-10 w-10 items-center justify-center rounded-2xl ${folder.tone === "primary" ? "bg-primary-fixed text-primary group-hover:bg-primary group-hover:text-white" : "bg-surface-container-high text-on-surface-variant group-hover:bg-on-surface-variant group-hover:text-white"} transition-all">
                  <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">${folder.icon}</span>
                </div>
                <h3 class="text-sm font-bold text-on-surface">${escapeHtml(folder.name)}</h3>
                <p class="mt-1 text-[11px] font-medium text-on-surface-variant">${folder.count} 项 • ${folder.size}</p>
              </button>
            `)
            .join("") +
          `
            <button id="newFolderBtn" class="group flex cursor-pointer flex-col items-center justify-center rounded-[1.75rem] border border-dashed border-outline-variant/40 bg-surface-container-low/40 p-4 text-on-surface-variant transition-all hover:border-primary/40 hover:bg-primary-fixed/20" type="button">
              <div class="mb-2 flex h-9 w-9 items-center justify-center rounded-full bg-surface-container-high group-hover:bg-primary-fixed group-hover:text-primary">
                <span class="material-symbols-outlined">add</span>
              </div>
              <span class="text-[11px] font-bold">新建文件夹</span>
            </button>
          `;
      }

      function renderTabs() {
        Array.from(refs.libraryTabs.querySelectorAll("[data-scope]")).forEach((button) => {
          const active = button.dataset.scope === state.scope;
          button.className = active ? "market-tab active" : "market-tab";
        });
      }

      function renderTags() {
        refs.tagFilters.innerHTML = state.tags
          .map((tag) => {
            const active = state.tag === tag;
            const label = tag === "all" ? "全部" : tag;
            return `<button class="${active ? "border border-[#f0c9c0] bg-[#fff1ed] text-[#e13b2d]" : "border border-transparent bg-[#f3efee] text-[#685a57]"} rounded-full px-[22px] py-2.5 text-[13px] font-bold leading-none shadow-none transition-colors" data-tag="${tag}" type="button">${label}</button>`;
          })
          .join("");
      }

      function cardPreview(file) {
        if (file.previewMode === "image") {
          return `<img alt="File Preview" class="h-full w-full object-cover opacity-80 transition-transform duration-500 group-hover:scale-105" src="${file.previewImage}" />`;
        }
        return `<div class="flex h-full w-full items-center justify-center ${file.previewIconTone === "primary" ? "bg-primary-fixed/20" : "bg-tertiary-fixed/20"}"><span class="material-symbols-outlined text-5xl ${file.previewIconTone === "primary" ? "text-primary" : "text-tertiary"} opacity-40">${file.previewIcon}</span></div>`;
      }

      function renderFiles() {
        const files = getVisibleFiles();
        refs.sectionTitle.textContent =
          state.scope === "trash"
            ? "回收站"
            : state.scope === "recent"
              ? "最近使用"
              : state.scope === "generated"
                ? "生成记录"
                : state.scope === "favorites"
                  ? "收藏文件"
                  : "最近生成";
        refs.clearTrashBtn.classList.toggle("hidden", state.scope !== "trash");
        refs.filesGrid.className =
          state.view === "grid"
            ? "grid grid-cols-2 gap-4"
            : "grid grid-cols-1 gap-3";
        refs.filesGrid.innerHTML = files.length
          ? files
              .map((file) => `
                <button class="group flex cursor-pointer ${state.view === "grid" ? "flex-col gap-4 rounded-3xl p-5" : "items-center gap-4 rounded-2xl p-4"} border ${file.id === state.selectedFileId ? "border-primary/40 ring-2 ring-primary/10" : "border-outline-variant/20"} bg-surface-container-lowest text-left shadow-[0_32px_32px_rgba(181,12,8,0.02)] transition-all hover:border-primary/30" data-file-id="${file.id}" type="button">
                  <div class="relative ${state.view === "grid" ? "h-32 overflow-hidden rounded-2xl bg-surface-container-low" : "h-20 w-28 shrink-0 overflow-hidden rounded-2xl bg-surface-container-low"}">
                    ${cardPreview(file)}
                    <div class="absolute left-3 top-3 flex items-center gap-1 rounded-full bg-white/95 px-3 py-1 text-[10px] font-bold ${file.sourceTone === "primary" ? "text-primary ring-primary/10 hover:bg-primary hover:text-white" : file.sourceTone === "tertiary" ? "text-tertiary ring-tertiary/10 hover:bg-tertiary hover:text-white" : "text-on-surface-variant ring-on-surface-variant/10 hover:bg-on-surface-variant hover:text-white"} shadow-sm ring-1 transition-colors">
                      <span class="material-symbols-outlined text-xs">${file.sourceIcon}</span>
                      ${escapeHtml(file.source)}
                    </div>
                  </div>
                  <div class="min-w-0 flex-1">
                    <div class="flex items-start justify-between gap-3">
                      <div class="min-w-0">
                        <h5 class="truncate text-sm font-bold text-on-surface">${escapeHtml(file.name)}</h5>
                        <div class="mt-2 flex flex-wrap items-center gap-2">
                          <span class="text-[11px] text-on-surface-variant">${file.size}</span>
                          <span class="rounded-full bg-surface-container-high px-2 py-1 text-[10px] font-bold text-on-surface-variant">${file.type}</span>
                          ${file.favorite ? '<span class="rounded-full bg-primary-fixed px-2 py-1 text-[10px] font-bold text-primary">收藏</span>' : ""}
                        </div>
                      </div>
                      <span class="material-symbols-outlined text-lg text-on-surface-variant">more_vert</span>
                    </div>
                  </div>
                </button>
              `)
              .join("")
          : `<div class="col-span-2 rounded-3xl border border-dashed border-outline-variant/40 bg-white/70 p-10 text-center text-sm font-medium text-on-surface-variant">没有匹配到文件，试试调整标签、搜索词或切换到其他分类。</div>`;
      }

      function renderPreview() {
        const file = getSelectedFile();
        refs.previewTitle.textContent = file.name;
        refs.previewTime.textContent = file.createdAt;
        refs.previewBadges.innerHTML = `
          <span class="rounded-full bg-primary-fixed px-3 py-1 text-[10px] font-bold text-primary">${file.type}</span>
          <span class="rounded-full bg-tertiary-fixed px-3 py-1 text-[10px] font-bold text-tertiary">${file.engine}</span>
          <span class="rounded-full bg-surface-container-high px-3 py-1 text-[10px] font-bold text-on-surface-variant">${file.folder}</span>
          ${file.tags.map((tag) => `<span class="rounded-full bg-surface-container-low px-3 py-1 text-[10px] font-bold text-on-surface-variant">${tag}</span>`).join("")}
        `;
        refs.previewSnippet.textContent = file.snippet;
        refs.insightList.innerHTML = file.insights
          .map(
            (item, index) => `
              <div class="flex items-center gap-3 rounded-xl border border-outline-variant/20 bg-white p-3">
                <span class="material-symbols-outlined text-lg text-primary">${item.startsWith("MCP") ? "extension" : "bolt"}</span>
                <span class="text-xs font-medium text-on-surface">${item}</span>
                <span class="material-symbols-outlined ml-auto text-sm text-on-surface-variant/40">chevron_right</span>
              </div>
            `
          )
          .join("");
        refs.deleteLabel.textContent = file.trashed ? "恢复" : "删除";
        refs.deleteIcon.textContent = file.trashed ? "restore_from_trash" : "delete";
      }

      function renderViewButtons() {
        refs.gridViewBtn.className = state.view === "grid" ? "rounded-full bg-white p-2 text-primary shadow-sm" : "p-2 text-on-surface-variant";
        refs.listViewBtn.className = state.view === "list" ? "rounded-full bg-white p-2 text-primary shadow-sm" : "p-2 text-on-surface-variant";
      }

      function render() {
        renderFolders();
        renderTabs();
        renderTags();
        renderFiles();
        renderPreview();
        renderViewButtons();
      }

      refs.searchInput.addEventListener("input", (event) => {
        state.search = event.target.value.trim();
        render();
      });

      refs.libraryTabs.addEventListener("click", (event) => {
        const button = event.target.closest("[data-scope]");
        if (!button) return;
        state.scope = button.dataset.scope;
        render();
      });

      refs.tagFilters.addEventListener("click", (event) => {
        const button = event.target.closest("[data-tag]");
        if (!button) return;
        state.tag = button.dataset.tag;
        render();
      });

      refs.gridViewBtn.addEventListener("click", () => {
        state.view = "grid";
        renderViewButtons();
        renderFiles();
      });

      refs.listViewBtn.addEventListener("click", () => {
        state.view = "list";
        renderViewButtons();
        renderFiles();
      });

      refs.folderCards.addEventListener("click", (event) => {
        const scopeButton = event.target.closest("[data-folder-scope]");
        if (scopeButton) {
          state.scope = scopeButton.dataset.folderScope;
          render();
          return;
        }
        const newFolder = event.target.closest("#newFolderBtn");
        if (newFolder) {
          const index = state.folders.length + 1;
          state.folders.push({
            id: `folder-${Date.now()}`,
            name: `新文件夹 ${index}`,
            count: 0,
            size: "0 MB",
            icon: "folder",
            tone: "primary",
            scope: "all"
          });
          renderFolders();
        }
      });

      refs.filesGrid.addEventListener("click", (event) => {
        const fileButton = event.target.closest("[data-file-id]");
        if (!fileButton) return;
        state.selectedFileId = fileButton.dataset.fileId;
        renderFiles();
        renderPreview();
      });

      refs.uploadBtn.addEventListener("click", () => {
        const uploaded = {
          id: `upload-${Date.now()}`,
          name: `上传文件_${state.files.length + 1}.pdf`,
          size: "860 KB",
          type: "上传",
          scope: "recent",
          favorite: false,
          trashed: false,
          source: "外部上传",
          sourceTone: "neutral",
          sourceIcon: "upload",
          folder: "我的资产",
          tags: ["上传", "文档"],
          createdAt: "今天, 刚刚",
          engine: "手动上传",
          previewMode: "icon",
          previewIcon: "picture_as_pdf",
          previewIconTone: "primary",
          snippet: "“新上传文件已进入云端文件夹，可继续用 AI 做总结、改写、翻译或结构化输出。”",
          insights: ["总结内容", "生成 PRD", "继续用 AI 编辑"]
        };
        state.files.unshift(uploaded);
        state.selectedFileId = uploaded.id;
        state.scope = "recent";
        render();
      });

      refs.aiEditBtn.addEventListener("click", () => {
        const file = getSelectedFile();
        alert(`已将《${file.name}》带入 AI 编辑流程。`);
      });

      refs.exportBtn.addEventListener("click", () => {
        const file = getSelectedFile();
        alert(`准备导出《${file.name}》。`);
      });

      refs.deleteBtn.addEventListener("click", () => {
        const file = getSelectedFile();
        if (file.trashed) {
          file.trashed = false;
          state.scope = "all";
        } else {
          file.trashed = true;
          state.scope = "trash";
        }
        render();
      });

      refs.clearTrashBtn.addEventListener("click", () => {
        state.files = state.files.filter((file) => !file.trashed);
        state.scope = "all";
        render();
      });

      refs.closePreviewBtn.addEventListener("click", () => {
        const visible = getVisibleFiles();
        if (visible.length > 1) {
          state.selectedFileId = visible[0].id;
        }
        renderPreview();
        renderFiles();
      });

      render();
    </script>
  </body>
</html>
