<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hubitos Chat Workspace</title>
    <link rel="stylesheet" href="../shared/sidebar.css" />
    <link rel="stylesheet" href="./chat-workspace.css" />
  </head>
  <body>
    <div class="desktop-stage">
      <main class="app-window">
        <div id="sharedSidebar"></div>

        <section class="chat-shell">
          <header class="topbar">
            <div class="topbar-left">
              <div class="user-mini">
                <div class="avatar dark">K</div>
                <div class="avatar soft">H</div>
              </div>
              <div>
                <div class="conversation-title" id="conversationTitle">Market Research Plan</div>
                <div class="conversation-meta" id="conversationMeta">Default folder: Brand Strategy / Model: Hubitos Pro</div>
              </div>
            </div>
            <div class="topbar-actions">
              <button class="icon-btn" id="pinConversationBtn" title="Pin conversation">◌</button>
              <button class="icon-btn" id="saveTemplateBtn" title="Save as template">◎</button>
            </div>
          </header>

          <div class="chat-content">
            <div class="chat-scroll" id="chatScroll">
              <div class="route-banner" id="routeBanner">
                Auto Routing is on: tasks automatically switch models based on reasoning intensity and attachment type.
              </div>

              <div class="home-start" id="homeStart">
                <div class="recent-sections" id="recentSections">
                  <section class="recent-section recent-section-skills">
                    <div class="recent-title">Recently Used Skills</div>
                    <div class="recent-list" id="recentSkills"></div>
                  </section>
                  <section class="recent-section recent-section-agents">
                    <div class="recent-title">Recently Used Agents</div>
                    <div class="recent-list" id="recentAgents"></div>
                  </section>
                  <section class="recent-section recent-section-prompts expanded" id="promptSection">
                    <div class="recent-title-row">
                      <div class="recent-title">Prompt</div>
                    </div>
                    <div class="recent-list recent-prompt-list" id="recentPrompts"></div>
                  </section>
                </div>
              </div>

              <div id="messageList"></div>
            </div>

            <div class="composer-wrap">
              <div class="composer-toolbar">
                <div class="toolbar-group">
                  <div class="format-picker">
                    <button class="tool-chip format-trigger" id="modelPickerToggle" type="button">
                      <span id="modelPickerLabel">✦ Hubitos Pro</span>
                    </button>
                    <div class="format-menu" id="modelPickerMenu"></div>
                  </div>
                </div>
                <div class="toolbar-group toolbar-group-right">
                  <button class="tool-action" id="attachFileBtn">+ Upload File</button>
                </div>
              </div>

              <div class="attached-items" id="attachedItems"></div>

              <div class="composer">
                <textarea
                  id="promptInput"
                  rows="3"
                  placeholder="Ask Hubitos to refine a draft, generate files, or start a desktop task directly..."
                ></textarea>
                <div class="composer-actions">
                  <button class="ghost-btn" id="toggleRoutingBtn" title="Auto routing toggle">⟲</button>
                  <button class="send-btn" id="sendBtn" title="Send">➤</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <aside class="context-panel">
          <div class="panel-section">
            <div class="mini-header">
              <span>Enabled Skills</span>
              <button class="text-btn" id="skillPresetBtn" type="button">Recommended</button>
            </div>
            <div class="skill-chips" id="skillChips"></div>
          </div>

          <div class="panel-section" id="assetsSection">
            <div class="mini-header">
              <span>Generated Assets</span>
            </div>
            <div class="asset-list" id="panelAssetList"></div>
          </div>
        </aside>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../shared/i18n.js"></script>
    <script src="../shared/sidebar.js"></script>
    <script>
      window.HubitosSidebar.mount("#sharedSidebar", {
        active: "chat",
        showHistory: true,
        historyTitle: "History",
        historyContainerId: "historyList",
        primaryLabel: "+ New Chat",
        primaryId: "newConversationBtn",
        chatHref: "./chat-workspace.html",
        filesHref: "../files/files-center.html",
        agentsHref: "../agents/agents-center.html",
        skillsHref: "../skills/skills-center.html",
        mcpHref: "../mcp/mcp-center.html"
      });
    </script>
    <script src="./chat-workspace.js"></script>
  </body>
</html>
