<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hubitos Chat Workspace</title>
    <link rel="stylesheet" href="../shared/sidebar.css" />
    <link rel="stylesheet" href="./chat-workspace.css" />
  </head>
  <body>
    <div class="desktop-stage">
      <main class="app-window">
        <div id="sharedSidebar"></div>

        <section class="chat-shell">
          <header class="topbar">
            <div class="topbar-left">
              <div class="user-mini">
                <div class="avatar dark">K</div>
                <div class="avatar soft">H</div>
              </div>
              <div>
                <div class="conversation-title" id="conversationTitle">市场研究计划</div>
                <div class="conversation-meta" id="conversationMeta">默认文件夹：品牌策略 / 输出：默认</div>
              </div>
            </div>
            <div class="topbar-actions">
              <button class="icon-btn" id="pinConversationBtn" title="固定会话">◌</button>
              <button class="icon-btn" id="saveTemplateBtn" title="固定为模板">◎</button>
            </div>
          </header>

          <div class="chat-content">
            <div class="chat-scroll" id="chatScroll">
              <div class="route-banner" id="routeBanner">
                Auto Routing 已开启：当前任务会根据推理强度、输出格式和附件类型自动切换模型。
              </div>

              <div class="home-start" id="homeStart">
                <div class="recent-sections" id="recentSections">
                  <section class="recent-section recent-section-skills">
                    <div class="recent-title">最近使用的 Skills</div>
                    <div class="recent-list" id="recentSkills"></div>
                  </section>
                  <section class="recent-section recent-section-agents">
                    <div class="recent-title">最近使用的 Agent</div>
                    <div class="recent-list" id="recentAgents"></div>
                  </section>
                  <section class="recent-section recent-section-prompts expanded" id="promptSection">
                    <div class="recent-title-row">
                      <div class="recent-title">Prompt</div>
                    </div>
                    <div class="recent-list recent-prompt-list" id="recentPrompts"></div>
                  </section>
                </div>
              </div>

              <div id="messageList"></div>
            </div>

            <div class="composer-wrap">
              <div class="composer-toolbar">
                <div class="toolbar-group">
                  <div class="format-picker">
                    <button class="tool-chip format-trigger" id="formatToggle" type="button">
                      输出格式：<span id="formatLabel">默认</span>
                    </button>
                    <div class="format-menu" id="formatMenu"></div>
                  </div>
                </div>
                <div class="toolbar-group toolbar-group-right">
                  <button class="tool-action" id="attachFileBtn">＋ 上传文件</button>
                </div>
              </div>

              <div class="attached-items" id="attachedItems"></div>

              <div class="composer">
                <textarea
                  id="promptInput"
                  rows="3"
                  placeholder="让 Hubitos 完善草案、生成文件，或直接发起一个桌面端任务..."
                ></textarea>
                <div class="composer-actions">
                  <button class="ghost-btn" id="toggleRoutingBtn" title="自动路由开关">⟲</button>
                  <button class="send-btn" id="sendBtn" title="发送">➤</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <aside class="context-panel">
          <div class="panel-title">当前模型</div>

          <div class="model-card" id="modelToggle">
            <div class="model-card-left">
              <div class="model-logo" id="currentModelLogo">✦</div>
              <div>
                <div class="model-name" id="currentModelName">Hubitos Pro</div>
                <div class="model-meta" id="currentModelMeta">精确 4.2 · 深度推理</div>
              </div>
            </div>
            <button class="model-expand" type="button" aria-label="切换模型">⌄</button>
          </div>

          <div class="model-dropdown" id="modelMenu"></div>

          <div class="token-block" id="tokenSection">
            <div class="token-header">
              <span>剩余 Token</span>
              <span class="token-value" id="tokenValue">14.2k / 128k</span>
            </div>
            <div class="token-bar">
              <div class="token-progress" id="tokenProgress"></div>
            </div>
          </div>

          <div class="panel-section">
            <div class="mini-header">
              <span>已启用技能</span>
              <button class="text-btn" id="skillPresetBtn" type="button">推荐</button>
            </div>
            <div class="skill-chips" id="skillChips"></div>
          </div>

          <div class="panel-section" id="assetsSection">
            <div class="mini-header">
              <span>已生成资产</span>
            </div>
            <div class="asset-list" id="panelAssetList"></div>
          </div>
        </aside>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../shared/i18n.js"></script>
    <script src="../shared/sidebar.js"></script>
    <script>
      window.HubitosSidebar.mount("#sharedSidebar", {
        active: "chat",
        showHistory: true,
        historyTitle: "历史对话",
        historyContainerId: "historyList",
        primaryLabel: "+ 新对话",
        primaryId: "newConversationBtn",
        chatHref: "./chat-workspace.html",
        filesHref: "../files/files-center.html",
        agentsHref: "../agents/agents-center.html",
        skillsHref: "../skills/skills-center.html",
        mcpHref: "../mcp/mcp-center.html"
      });
    </script>
    <script src="./chat-workspace.js"></script>
  </body>
</html>
